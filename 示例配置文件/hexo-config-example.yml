# Hexo 配置文件示例
# 将此文件的内容复制到 Hexo 项目根目录的 _config.yml

# 网站基本信息
title: 你的博客标题
subtitle: '副标题'
description: '博客描述，用于SEO'
keywords: "博客,技术,编程"
author: 你的名字
language: zh-CN
timezone: 'Asia/Shanghai'

# URL 配置
url: https://yourdomain.com
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# 目录结构
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# 写作配置
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# 首页设置
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# 分类 & 标签
default_category: uncategorized
category_map:
tag_map:

# 日期 / 时间格式
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# 分页
per_page: 10
pagination_dir: page

# 主题
theme: next  # 或其他主题名称

# 部署配置（使用 GitHub Actions 时可不配置）
deploy:
  type: ''

# 扩展插件
# 需要先安装对应的 npm 包
# npm install hexo-generator-sitemap --save
# npm install hexo-generator-feed --save
# npm install hexo-generator-searchdb --save

# SEO - Sitemap
sitemap:
  path: sitemap.xml
baidusitemap:
  path: baidusitemap.xml

# RSS Feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: icon.png
  autodiscovery: true
  template:

# 搜索
search:
  path: search.xml
  field: post
  format: html
  limit: 10000
